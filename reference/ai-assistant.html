<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会统计学 · AI助手</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  body { padding-bottom: 0; }
  .chat-container { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; height: calc(100vh - 60px); }
  #messages { flex: 1; overflow-y: auto; padding: 1rem; background: #f9f7f3; border-radius: var(--radius); margin: 1rem 0; }
  .msg { margin: 0.8rem 0; padding: 0.8rem 1rem; border-radius: var(--radius); max-width: 85%; }
  .user { background: var(--accent); color: white; align-self: flex-end; margin-left: auto; }
  .assistant { background: white; border: 1px solid var(--border); align-self: flex-start; }
  .input-bar { display: flex; gap: 0.5rem; }
  .input-bar input { flex: 1; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; }
  .input-bar button { padding: 0.7rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 1rem; }
  .input-bar button:disabled { opacity: 0.5; }
  .api-setup { background: var(--accent-light); padding: 1rem; border-radius: var(--radius); margin: 1rem 0; }
  .api-setup input { padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); width: 100%; margin: 0.3rem 0; }
  .typing::after { content: "..."; animation: dot 1.5s infinite; }
  @keyframes dot { 0%,20% { content: "."; } 40% { content: ".."; } 60%,100% { content: "..."; } }
</style>
</head>
<body>

<nav class="breadcrumb">
  <a href="../index.html">首页</a> ·
  <a href="../lessons/0001-random-events.html">第1课</a> ·
  <a href="../reference/formula-cheat-sheet.html">公式速查</a>
</nav>

<h1>🤖 AI助手</h1>
<p>你有任何问题可以直接问。选一个预设问题或自己输入。</p>

<div class="chat-container">
  <div class="api-setup" id="setup">
    <p>请输入你的DeepSeek API Key（设置后保存在本地，不会上传到任何服务器）：</p>
    <input type="password" id="apikey" placeholder="sk-...">
    <button onclick="saveKey()">保存</button>
    <span id="key-status" style="margin-left:0.5rem;"></span>
  </div>

  <div id="messages">
    <div class="msg assistant">你好！我是你的社会统计学AI助教。有什么不懂的可以直接问我。</div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin:0.5rem 0;">
    <button onclick="quickQ('条件概率和全概率有什么区别？')" style="font-size:0.8rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;">条件概率vs全概率</button>
    <button onclick="quickQ('正态标准化怎么算？举个例子')" style="font-size:0.8rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;">正态标准化</button>
    <button onclick="quickQ('独立和不相关有什么区别？')" style="font-size:0.8rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;">独立vs不相关</button>
    <button onclick="quickQ('中心极限定理说明了什么？')" style="font-size:0.8rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;">中心极限定理</button>
    <button onclick="quickQ('置信区间σ已知和σ未知的公式分别是什么？')" style="font-size:0.8rem;padding:0.3rem 0.6rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;">置信区间公式</button>
  </div>

  <div class="input-bar">
    <input type="text" id="question" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('ds_api_key') || '';
if (apiKey) {
  document.getElementById('apikey').value = '****已保存****';
  document.getElementById('key-status').textContent = '✅ 已设置';
}

function saveKey() {
  const key = document.getElementById('apikey').value.trim();
  if (key && key.startsWith('sk-')) {
    apiKey = key;
    localStorage.setItem('ds_api_key', key);
    document.getElementById('apikey').value = '****已保存****';
    document.getElementById('key-status').textContent = '✅ 已保存';
  } else {
    alert('请输入有效的API Key（以sk-开头）');
  }
}

function addMsg(content, role) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function quickQ(text) {
  document.getElementById('question').value = text;
  send();
}

async function send() {
  const input = document.getElementById('question');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  addMsg(text, 'user');
  document.getElementById('sendBtn').disabled = true;
  
  // Check API key
  const key = apiKey || localStorage.getItem('ds_api_key') || '';
  if (!key || key === '****已保存****' || key === '') {
    addMsg('请先在上方输入并保存你的DeepSeek API Key。\n\n🔑 获取方式：\n1. 打开 https://platform.deepseek.com/api_keys\n2. 登录后创建一个API Key\n3. 复制到本页面保存', 'assistant');
    document.getElementById('sendBtn').disabled = false;
    return;
  }
  
  const typing = addMsg('正在思考', 'assistant typing');
  
  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          {role: 'system', content: '你是一个社会统计学（概率论与数理统计）的助教。你擅长用通俗易懂的方式解释统计学概念。你的回答要清晰、一步步来，必要时给出具体例子。尽量用中文回答。'},
          {role: 'user', content: text}
        ],
        max_tokens: 1000,
        temperature: 0.7
      })
    });
    
    typing.className = 'msg assistant';
    typing.textContent = '';
    
    if (!resp.ok) {
      const err = await resp.text();
      typing.textContent = '请求失败：' + resp.status + '。' + (resp.status === 401 ? 'API Key无效，请检查。' : err.slice(0,200));
      return;
    }
    
    const data = await resp.json();
    typing.textContent = data.choices[0].message.content;
    
  } catch(e) {
    typing.className = 'msg assistant';
    typing.textContent = '网络错误：' + e.message + '。请检查网络连接或API Key。';
  }
  
  document.getElementById('sendBtn').disabled = false;
}
</script>

</body>
</html>
