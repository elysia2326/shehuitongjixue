<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会统计学 · 分屏学习模式</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; }
  .split { display:flex; height:100vh; overflow:hidden; }
  .left { flex:6; overflow-y:auto; padding:20px; background:#fdfcf9; }
  .right { flex:4; display:flex; flex-direction:column; background:#fff; border-left:2px solid #d9cdb6; min-width:320px; }
  .right .header { background:#8b4513; color:white; padding:12px 16px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .right .header .close { cursor:pointer; font-size:20px; color:#fff; text-decoration:none; }
  .right .msgs { flex:1; overflow-y:auto; padding:10px; background:#f9f7f3; display:flex; flex-direction:column; gap:6px; }
  .msg { padding:8px 12px; border-radius:8px; max-width:90%; word-break:break-word; line-height:1.5; font-size:14px; }
  .msg.user { background:#8b4513; color:white; align-self:flex-end; }
  .msg.assistant { background:white; border:1px solid #ddd; align-self:flex-start; }
  .quick-btns { display:flex; gap:4px; flex-wrap:wrap; padding:6px 10px; }
  .quick-btns button { font-size:12px; padding:4px 8px; border:1px solid #ddd; border-radius:4px; cursor:pointer; background:white; }
  .quick-btns button:hover { background:#f0e6d9; }
  .api-row { padding:6px 10px; background:#f0e6d9; font-size:12px; }
  .api-row input { width:100%; padding:4px 8px; border:1px solid #ccc; border-radius:4px; font-size:12px; }
  .api-row button { margin-top:4px; padding:3px 10px; background:#8b4513; color:white; border:none; border-radius:4px; cursor:pointer; font-size:11px; }
  .input-row { display:flex; padding:8px 10px; border-top:1px solid #eee; gap:6px; }
  .input-row input { flex:1; padding:8px 10px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
  .input-row button { padding:8px 14px; background:#8b4513; color:white; border:none; border-radius:4px; cursor:pointer; }
  .input-row button:disabled { opacity:0.5; }
  .left-nav { font-size:13px; margin-bottom:12px; }
  .left-nav a { color:#8b4513; }
  .left-frame { width:100%; max-width:800px; margin:0 auto; }
  hr { border:0; border-top:1px solid #ddd; margin:8px 0; }
  .key-status { margin-left:6px; font-size:11px; }
</style>
</head>
<body>

<div class="split">
  <div class="left">
    <div class="left-nav">
      <a href="lessons/0001-random-events.html">第1课</a> ·
      <a href="lessons/0002-random-variables.html">第2课</a> ·
      <a href="lessons/0003-numerical-characteristics.html">第3课</a> ·
      <a href="lessons/0004-sampling-estimation.html">第4课</a> ·
      <a href="reference/formula-cheat-sheet.html">公式速查</a> ·
      <a href="reference/practice-questions.html">练习</a>
      <span style="float:right;font-size:12px;color:#999;">分屏学习模式</span>
    </div>
    <div id="lesson-content" class="left-frame">
      <h2>📖 选择一课开始学习</h2>
      <p style="margin-top:20px;">点上面的链接加载课程内容。右侧AI助教会常驻在这里，随时提问。</p>
    </div>
  </div>

  <div class="right">
    <div class="header">
      <span>🤖 AI助教</span>
      <span style="font-size:12px;font-weight:normal;">随时提问</span>
    </div>
    <div class="api-row" id="api-row">
      <input type="password" id="api-key" placeholder="DeepSeek API Key (sk-...)" style="font-size:12px;">
      <button id="save-key-btn">保存</button>
      <span class="key-status" id="key-status"></span>
    </div>
    <div class="msgs" id="chat-msgs">
      <div class="msg assistant">你好！右侧常驻AI助教。点上面的课程链接，左侧加载内容，右侧随时提问。</div>
    </div>
    <div class="quick-btns" id="quick-btns">
      <button onclick="ask('条件概率和全概率有什么区别？')">条件概率vs全概率</button>
      <button onclick="ask('独立和不相关有什么区别？')">独立vs不相关</button>
      <button onclick="ask('中心极限定理说明了什么？')">中心极限定理</button>
      <button onclick="ask('正态标准化怎么算？举个例子')">正态标准化</button>
      <button onclick="ask('置信区间σ已知和σ未知的公式分别是什么？')">置信区间公式</button>
    </div>
    <div class="input-row">
      <input type="text" id="chat-input" placeholder="输入问题..." onkeypress="if(event.key==='Enter') send()">
      <button id="send-btn" onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
var apiKey = localStorage.getItem('ds_api_key') || '';
if (apiKey) {
  document.getElementById('api-key').value = '****已保存****';
  document.getElementById('key-status').textContent = '✅';
}

document.getElementById('save-key-btn').onclick = function() {
  var k = document.getElementById('api-key').value.trim();
  if (k.startsWith('sk-')) {
    apiKey = k;
    localStorage.setItem('ds_api_key', k);
    document.getElementById('api-key').value = '****已保存****';
    document.getElementById('key-status').textContent = '✅';
  } else {
    document.getElementById('key-status').textContent = '❌';
  }
};

function addMsg(text, role) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text;
  document.getElementById('chat-msgs').appendChild(div);
  document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
  return div;
}

function ask(text) {
  document.getElementById('chat-input').value = text;
  send();
}

async function send() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  var btn = document.getElementById('send-btn');
  btn.disabled = true;

  if (!apiKey) {
    addMsg('⚠️ 请在上方输入DeepSeek API Key并保存。获取：platform.deepseek.com/api_keys', 'assistant');
    btn.disabled = false;
    return;
  }

  var typing = addMsg('...', 'assistant');

  try {
    var resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{role:'system',content:'你是社会统计学助教。规则：1.用纯中文回答 2.不要使用markdown符号(##,**等) 3.每段话之间空一行 4.公式用文字或/表示 5.多用例子'},{role:'user',content:text}],
        max_tokens: 800,
        temperature: 0.7
      })
    });
    if (!resp.ok) {
      typing.innerHTML = resp.status===401?'API Key无效':'请求失败:'+resp.status;
      btn.disabled = false;
      return;
    }
    var data = await resp.json();
    var content = data.choices[0].message.content;
    // basic formatting
    content = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    content = content.replace(/\n\n/g, '<br><br>');
    content = content.replace(/\n/g, '<br>');
    typing.innerHTML = content;
  } catch(e) {
    typing.innerHTML = '网络错误:'+e.message;
  }
  btn.disabled = false;
}
</script>

</body>
</html>
